<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail</title>
</head>
<body>
    <h1>{{ post.title }}</h1>

    <a href="{% url 'posts_by_author' post.author.id %}">{{ post.author.name }}</a>
    <p><strong>Дата:</strong> {{ post.published_date }}</p>

    <hr>

    <p>{{ post.content }}</p>
</body>
</html>
