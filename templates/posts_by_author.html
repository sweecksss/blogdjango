<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts by author</title>
</head>
<body>
    <h1>Пости автора: {{ author.name }}</h1>

    {% for post in posts %}
        <h2><a href="{% url 'post_detail' post.id %}">{{ post.title }}</a></h2>
        <p>{{ post.content }}</p>
        <hr>
    {% empty %}
        <p>У цього автора немає постів.</p>
    {% endfor %}
</body>
</html>
